/* ---------- API 키 (브라우저 보관 — 데모 전용) ---------- */
const KEY_STORAGE = "shaveiq:apikey";
function loadApiKey() {
  try { return localStorage.getItem(KEY_STORAGE) || ""; } catch { return ""; }
}
function saveApiKey(k) {
  try { localStorage.setItem(KEY_STORAGE, k); } catch {}
}
function clearApiKey() {
  try { localStorage.removeItem(KEY_STORAGE); } catch {}
}

/* ---------- Claude API ---------- */
async function callClaude(messages, system, maxTokens = 1000) {
  const apiKey = loadApiKey();
  if (!apiKey) throw new Error("NO_KEY");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: maxTokens,
      system,
      messages,
    }),
  });
  if (!res.ok) {
    if (res.status === 401) throw new Error("BAD_KEY");
    throw new Error("API " + res.status);
  }
  const data = await res.json();
  return data.content
    .filter((b) => b.type === "text")
    .map((b) => b.text)
    .join("\n");
}

function apiErrorMessage(e) {
  if (e && e.message === "NO_KEY") return "API 키가 설정되지 않았습니다. 우측 상단 ⚙에서 키를 입력해 주세요.";
  if (e && e.message === "BAD_KEY") return "API 키가 올바르지 않습니다. 우측 상단 ⚙에서 키를 다시 입력해 주세요.";
  return "분석에 실패했습니다. 잠시 후 다시 시도해 주세요.";
}

function parseJSON(text) {
  const clean = text.replace(/```json|```/g, "").trim();
  const s = clean.indexOf("{");
  const e = clean.lastIndexOf("}");
  return JSON.parse(clean.slice(s, e + 1));
}

/* ---------- 이미지 → base64 ---------- */
function fileToB64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("read fail"));
    r.readAsDataURL(file);
  });
}

/* ---------- 저장소 (localStorage 셔임) ---------- */
async function loadKey(key) {
  try {
    const r = localStorage.getItem(key);
    return r ? JSON.parse(r) : null;
  } catch {
    return null;
  }
}
async function saveKey(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
  } catch (e) {
    console.error("storage", e);
  }
}
async function deleteKey(key) {
  try { localStorage.removeItem(key); } catch {}
}

${currentRazor !== "미입력" ? "현재 사용 제품의 날 수·특성을 고려해, 도루코 제품 전환 시 무엇이 달라지는지 비교 관점으로 추천 근거를 작성해 주세요." : ""}

      const content = img

    const userMsg = { role: "user", text, hasImg: !!img };

    try {
      const system = `당신은 도루코 'SHAVE IQ'의 면도 트러블 상담 어시스턴트입니다.
- 면도로 인한 자극, 붉음, 뾰루지, 인그로운 헤어, 면도 기법, 제품 사용법을 상담합니다.
- 의료 진단·치료 조언은 하지 않습니다. 병변이 의심되거나 증상이 2주 이상 지속된다는 언급이 있으면 피부과 상담을 권하세요.
- 원인을 단정하지 말고 후보를 좁혀가며 1개의 확인 질문으로 이어가세요.
- 답변은 한국어, 4~6문장 이내로 간결하게. 필요 시 도루코 제품을 자연스럽게 1개만 제안.
${CATALOG}
${profile ? `사용자 프로파일: ${profile.profile_title} / 수염밀도 ${profile.beard?.density} / 피부민감도 ${profile.skin?.sensitivity} / 면도 시 사용: ${profile.answers?.prep || "미확인"}` : "프로파일 미분석 사용자"}`;

      const history = newMsgs.slice(0, -1).map((m) => ({ role: m.role === "user" ? "user" : "assistant", content: m.text }));
      const reply = await callClaude([...history, { role: "user", content: apiContent }], system, 700);
      setMsgs((p) => [...p, { role: "assistant", text: reply }]);
    } catch (e) {
      console.error(e);
      setMsgs((p) => [...p, { role: "assistant", text: apiErrorMessage(e) }]);
    }
    setLoading(false);
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", minHeight: "calc(100vh - 210px)" }}>

            </p>
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 12 }}>
              {["면도 후 목에 붉은 뾰루지가 나요", "턱 밑에 인그로운 헤어가 자꾸 생겨요", "역방향 면도, 해도 되나요?"].map((q) => (
                <button key={q} onClick={() => send(q)} style={{ textAlign: "left", background: T.bg, border: "none", padding: "11px 14px", fontSize: 13.5, clipPath: CUT_SM }}>

                </button>
              ))}
            </div>

        {msgs.map((m, i) => (
          <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start", marginBottom: 10 }}>
            <div

                clipPath: CUT_SM,
                background: m.role === "user" ? T.edge : T.surface,
                color: m.role === "user" ? "#fff" : T.ink,
                boxShadow: m.role === "user" ? "none" : "0 1px 3px rgba(18,22,27,.06)",

        <div ref={bottomRef} />

      <div style={{ position: "sticky", bottom: 74, background: T.bg, paddingTop: 8 }}>

          <input
            value={input}
            onChange={(e) => setInput(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && !loading && send()}
            placeholder="면도 고민을 입력하세요"
            style={{ flex: 1, padding: "12px 13px", border: `1px solid ${T.line}`, background: T.surface, fontSize: 14 }}
          />
          <EdgeButton onClick={() => send()} disabled={loading}>전송</EdgeButton>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   ③ 블레이드 컨시어지 탭
   ============================================================ */
const FREQ_PER_WEEK = { "주 5회 이상": 5.5, "주 3~4회": 3.5, "주 1~2회": 1.5, "그 이하": 0.7 };
const THICK_MULT = { "가는 편": 1.2, "보통": 1.0, "굵고 억센 편": 0.8 };

/* 면도기 유형별 기준 수명 추정 (프로토타입 규칙 기반)
   실서비스에서는 제품 마스터 DB의 권장 교체 주기 필드 + 재구매 데이터로 보정 필요 */
function inferRazorLife(brand, model) {
  const m = model || "";
  if (brand === "전기면도기") return { type: "electric", days: 540, label: "전기면도기 헤드(통상 12~18개월)" };
  if (m.includes("일회용")) return { type: "shaves", shaves: 4, label: "일회용 면도기" };
  if (brand === "클래식 양날" || m.includes("양날") || m.includes("PRIME") || m.includes("인젝터"))
    return { type: "shaves", shaves: 6, label: "클래식 양날 면도날" };
  if (m.includes("SLEEK")) return { type: "shaves", shaves: 14, label: "슬릭 카트리지" };
  if (m.includes("3D")) return { type: "shaves", shaves: 13, label: "3D 모션 카트리지" };
  if (m.includes("프로글라이드") || m.includes("프로쉴드")) return { type: "shaves", shaves: 12, label: "5중날 카트리지" };
  if (/7/.test(m)) return { type: "shaves", shaves: 14, label: "7중날 카트리지" };
  if (/6/.test(m)) return { type: "shaves", shaves: 13, label: "6중날 카트리지" };
  if (/5/.test(m)) return { type: "shaves", shaves: 12, label: "5중날 카트리지" };
  if (/4/.test(m)) return { type: "shaves", shaves: 11, label: "4중날 카트리지" };
  if (/3/.test(m)) return { type: "shaves", shaves: 10, label: "3중날 카트리지" };
  return { type: "shaves", shaves: 12, label: "카트리지" };
}

function calcCycleDays(brand, model, thick, freq) {
  const inf = inferRazorLife(brand, model);
  if (inf.type === "electric") return { days: inf.days, shaves: null, label: inf.label };
  const shaves = Math.max(2, Math.round(inf.shaves * (THICK_MULT[thick] || 1)));
  const days = Math.max(3, Math.round((shaves / (FREQ_PER_WEEK[freq] || 3.5)) * 7));
  return { days, shaves, label: inf.label };
}

function BladeTab({ profile, blade, setBlade }) {
  const pBrand = profile?.answers?.curBrand;
  const defaultBrand = blade?.brand || (MARKET_RAZORS[pBrand] ? pBrand : "도루코 (DORCO)");
  const pModel = profile?.answers?.curModel;

  const [freq, setFreq] = useState(blade?.freq || profile?.answers?.freq || "주 3~4회");
  const [thick, setThick] = useState(blade?.thick || profile?.answers?.thick || "보통");
  const [brand, setBrand] = useState(defaultBrand);
  const [model, setModel] = useState(
    blade?.model || (pModel && pModel !== "모델 선택" && MARKET_RAZORS[defaultBrand]?.includes(pModel) ? pModel : MARKET_RAZORS[defaultBrand]?.[0])
  );
  const [mode, setMode] = useState(blade?.mode || "auto");
  const [manualDays, setManualDays] = useState(blade?.manualDays || 21);

  const auto = calcCycleDays(brand, model, thick, freq);
  const cycleDays = mode === "manual" ? (Number(manualDays) || 21) : auto.days;

  async function startTracking() {
    const rec = { start: new Date().toISOString(), freq, thick, brand, model, mode, manualDays: Number(manualDays) || 21 };
    setBlade(rec);
    await saveKey("shaveiq:blade", rec);
  }

  if (!blade) {
    return (
      <>
        <div style={{ marginBottom: 18 }}>
          <h1 style={{ fontSize: 24, fontWeight: 900, letterSpacing: "-0.5px", lineHeight: 1.25 }}>
            무뎌지기 전에,<br />정확한 타이밍에 교체
          </h1>
          <p style={{ fontSize: 13.5, color: T.steel, marginTop: 8, lineHeight: 1.6 }}>
            사용 중인 면도기와 면도 습관에 맞춰 교체 시점을 알려드립니다. 무딘 날은 피부 자극의 가장 흔한 원인입니다.
          </p>
        </div>
        <Card>
          <SectionLabel>사용 중인 면도기</SectionLabel>
          <Field label="브랜드">
            <Select
              value={brand}
              onChange={(v) => { setBrand(v); setModel(MARKET_RAZORS[v]?.[0]); }}
              options={Object.keys(MARKET_RAZORS)}
            />
          </Field>
          <Field label="모델">
            <Select value={model} onChange={setModel} options={MARKET_RAZORS[brand] || []} />
          </Field>
          {profile?.answers?.curBrand && MARKET_RAZORS[profile.answers.curBrand] && !blade && (
            <p style={{ fontSize: 11.5, color: "#9AA0A4", marginTop: -6, marginBottom: 4 }}>
              프로파일 분석 때 선택한 면도기가 기본으로 들어가 있습니다.
            </p>
          )}
        </Card>
        <Card>
          <SectionLabel>내 면도 습관</SectionLabel>
          <Field label="면도 빈도">
            <Select value={freq} onChange={setFreq} options={Object.keys(FREQ_PER_WEEK)} />
          </Field>
          <Field label="수염 굵기">
            <Select value={thick} onChange={setThick} options={Object.keys(THICK_MULT)} />
          </Field>
        </Card>
        <Card>
          <SectionLabel>교체 주기</SectionLabel>
          <div style={{ background: T.bg, padding: "13px 14px", fontSize: 13.5, lineHeight: 1.6, marginBottom: 12 }}>
            {auto.shaves
              ? <>이 면도기({auto.label}) 기준 추정 주기: <b>약 {auto.shaves}회 (≈{auto.days}일)</b></>
              : <>이 면도기 기준 권장 교체 주기: <b>약 {auto.days}일</b> ({auto.label})</>}
          </div>
          <Field label="추정 주기가 내 실제 주기와 다른가요?">
            <Select
              value={mode === "manual" ? "직접 설정" : "추정 주기 사용"}
              onChange={(v) => setMode(v === "직접 설정" ? "manual" : "auto")}
              options={["추정 주기 사용", "직접 설정"]}
            />
          </Field>
          {mode === "manual" && (
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
              <input
                type="number"
                min={3}
                max={365}
                value={manualDays}
                onChange={(e) => setManualDays(e.target.value)}
                style={{ width: 90, padding: "11px 12px", border: `1px solid ${T.line}`, background: "#FAFBFC", fontSize: 14 }}
              />
              <span style={{ fontSize: 14 }}>일마다 교체</span>
            </div>
          )}
          <EdgeButton full onClick={startTracking}>새 카트리지로 추적 시작 (주기 {cycleDays}일)</EdgeButton>
        </Card>
      </>
    );
  }

  const startDate = new Date(blade.start);
  const daysUsed = Math.max(0, Math.floor((Date.now() - startDate) / 86400000));
  const saved = calcCycleDays(blade.brand, blade.model, blade.thick, blade.freq);
  const est = blade.mode === "manual" ? blade.manualDays : saved.days;
  const remain = Math.max(0, est - daysUsed);
  const pct = Math.min(100, Math.round((daysUsed / est) * 100));
  const dueDate = new Date(startDate.getTime() + est * 86400000);
  const status = pct >= 100 ? ["교체 시점 도래", T.warn] : pct >= 80 ? ["곧 교체", T.warn] : ["양호", T.ok];

  return (
    <>
      <Card style={{ background: T.ink, color: "#fff" }}>
        <div style={{ fontFamily: LATIN, fontSize: 11, letterSpacing: "2px", color: "#9AA0A4", marginBottom: 4 }}>BLADE STATUS</div>
        <div style={{ fontSize: 12.5, color: "#C6C9CC", marginBottom: 10 }}>{blade.brand} {blade.model}</div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
          <span style={{ fontSize: 30, fontWeight: 900 }}>{remain}<span style={{ fontSize: 14, fontWeight: 500, color: "#8B98A5" }}> 일 남음</span></span>
          <span style={{ fontSize: 13, fontWeight: 700, color: status[1] === T.ok ? "#5BD69A" : "#FFB067" }}>{status[0]}</span>
        </div>
        <div style={{ marginTop: 14, height: 8, background: "#2A3440", clipPath: CUT_SM }}>
          <div style={{ width: pct + "%", height: "100%", background: pct >= 80 ? "#FF8C42" : T.edge, transition: "width .4s" }} />
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11.5, color: "#8B98A5", marginTop: 8 }}>
          <span>사용 {daysUsed}일차</span>
          <span>권장 교체일 {dueDate.getMonth() + 1}/{dueDate.getDate()}</span>
        </div>
      </Card>

      <Card>
        <SectionLabel>추정 기준</SectionLabel>
        <p style={{ fontSize: 13.5, lineHeight: 1.7, color: T.steel }}>
          {blade.mode === "manual"
            ? <>직접 설정한 주기 <b>{blade.manualDays}일</b>을 사용 중입니다. (참고: {blade.model} 자동 추정 주기는 약 {saved.days}일)</>
            : <>{blade.brand} {blade.model}({saved.label}) · {blade.thick} 수염 · {blade.freq} 기준으로 {saved.shaves ? <>약 <b>{saved.shaves}회(≈{saved.days}일)</b></> : <>약 <b>{saved.days}일</b></>} 주기로 추정했습니다.</>}
        </p>
        {profile?.answers?.prep && profile.answers.prep !== "쉐이빙 폼·젤" && (
          <p style={{ fontSize: 12.5, lineHeight: 1.65, color: T.warn, marginTop: 8 }}>
            참고: 쉐이빙 폼·젤 없이 면도하면 날 마찰·마모가 커져 실제 체감 수명이 추정보다 짧을 수 있습니다. 윤활 제품 사용을 권장합니다.
          </p>
        )}
      </Card>

      <Card>
        <SectionLabel>교체 신호 체크</SectionLabel>
        {["당기는 느낌이 들거나 같은 부위를 반복해서 밀게 됨", "면도 후 따가움·붉음이 평소보다 오래감", "날 사이에 세척해도 잔여물이 남음"].map((s, i) => (
          <p key={i} style={{ fontSize: 13.5, lineHeight: 1.7, marginBottom: 6 }}>· {s}</p>
        ))}
      </Card>

      <div style={{ display: "flex", gap: 10 }}>
        <EdgeButton full onClick={startTracking}>교체 완료 — 새 카트리지 시작</EdgeButton>
        <button
          onClick={async () => { setBlade(null); await deleteKey("shaveiq:blade"); }}
          style={{ background: "none", border: `1px solid ${T.line}`, padding: "0 16px", fontSize: 13, whiteSpace: "nowrap" }}
        >
          면도기·주기 변경
        </button>
      </div>
      <p style={{ fontSize: 11.5, color: "#8B98A5", marginTop: 14, lineHeight: 1.6 }}>
        프로토타입에서는 알림 대신 앱 내 상태로 표시합니다. 실서비스에서는 교체 시점 푸시 알림 + 재구매 링크로 연결됩니다.
      </p>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ShaveIQ />);
</script>
</body>
</html>
